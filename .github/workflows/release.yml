name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/version to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ github.event.inputs.tag }}' } else { '${{ github.ref_name }}' }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish self-contained win-x64
        run: dotnet publish src/App/ModelCodex.App.csproj -c Release -r win-x64 --self-contained true -o publish

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath "model-codex-${{ steps.ver.outputs.version }}-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: Model Codex ${{ steps.ver.outputs.version }}
          files: model-codex-*-win-x64.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
